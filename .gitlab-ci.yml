image: mcr.microsoft.com/playwright:v1.60.0-noble

stages:
  - test

e2e-tests:
  stage: test
  script:
    - node -v
    - npm -v
    - yarn -v
    - yarn install
    - yarn run e2e
    - yarn run allure:generate
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - allure-results/
      - allure-report/
      - test-results/