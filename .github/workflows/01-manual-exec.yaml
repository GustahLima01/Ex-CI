# CI de Nível 01 - Disparo Manual através de clique

# nome da pipeline
name: 'Execução Manual'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch

on:
    workflow_dispatch:

# tarefas dentro da pipeline = jobs

jobs:

    # nome do job
    e2e-tests:
        # mquina onde o job vai rooar
        runs-on: ubuntu-latest

        # passos do job
        steps:
            #clone do projeto
            - uses: actions/checkout@v4

            # instalação do node
            - uses: actions/setup-node@v4
              with:
                node-version: 24.x

            # instalação do yarn
            - name: Instando yarn
              run: npm install -g yarn

            # instalação das dependências
            - name: Instalando dependências
              run: yarn

            # Instalação dos browsers do Playwrigth
            - name: Instalando Browsers do Playwright
              run: yarn playwright install

            # Execução dos testes e2e
            - name: Executando testes e2e
              run: yarn run e2e